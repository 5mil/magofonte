# fly.toml — MagoFonte on Fly.io
# Deploy: fly deploy
# Secrets (never commit values): fly secrets set KEY=VALUE

app = 'magofonte'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  # ── Server ──────────────────────────────────────────────────────
  PORT                = '8080'
  HOST                = '0.0.0.0'
  NODE_ENV            = 'production'

  # ── Pool ────────────────────────────────────────────────────────
  POOL_ALGO           = 'skein'
  # DGB_RPC_HOST      → fly secrets set DGB_RPC_HOST=...
  # DGB_RPC_USER      → fly secrets set DGB_RPC_USER=...
  # DGB_RPC_PASS      → fly secrets set DGB_RPC_PASS=...
  # DGB_REWARD_ADDRESS→ fly secrets set DGB_REWARD_ADDRESS=...

  # ── Treasury ────────────────────────────────────────────────────
  # TREASURY_WALLET_ADDRESS → fly secrets set TREASURY_WALLET_ADDRESS=Fz8zVrdkXS3kDZzjkpogB9KmR9DHaJPUPGbjrqm8824J
  # TREASURY_DGB_ADDRESS    → fly secrets set TREASURY_DGB_ADDRESS=DLbr1DaJs8bAU7BJfW92rLheVZHzDmR5KJ
  # TREASURY_LTC_ADDRESS    → fly secrets set TREASURY_LTC_ADDRESS=LcqqWQscuYtGVsRwbarnqVu7Y9tF3XXqjG

  # ── Vault ───────────────────────────────────────────────────────
  VAULT_BACKEND       = 'mock'
  # For keystore backend:
  # VAULT_BACKEND           → fly secrets set VAULT_BACKEND=keystore
  # VAULT_KEYSTORE_PATH     → fly secrets set VAULT_KEYSTORE_PATH=/app/secrets/keystore.json
  # VAULT_KEYSTORE_PASS     → fly secrets set VAULT_KEYSTORE_PASS=...
  # For remote backend:
  # VAULT_BACKEND           → fly secrets set VAULT_BACKEND=remote
  # VAULT_REMOTE_URL        → fly secrets set VAULT_REMOTE_URL=https://signer.yourserver.com
  # VAULT_REMOTE_TOKEN      → fly secrets set VAULT_REMOTE_TOKEN=...

  # ── Lancia ──────────────────────────────────────────────────────
  LANCIA_BACKEND      = 'fly'
  # FLY_API_TOKEN    → fly secrets set FLY_API_TOKEN=...
  FLY_APP_NAME        = 'magofonte'

  # ── Supabase ────────────────────────────────────────────────────
  # SUPABASE_URL         → fly secrets set SUPABASE_URL=...
  # SUPABASE_SERVICE_KEY → fly secrets set SUPABASE_SERVICE_KEY=...

  # ── Helius (Solana RPC) ─────────────────────────────────────────
  # HELIUS_API_KEY → fly secrets set HELIUS_API_KEY=...

  # ── CORS ────────────────────────────────────────────────────────
  CORS_ORIGINS        = 'https://5mil.github.io,https://magofonte.fly.dev'

[[services]]
  protocol    = 'tcp'
  internal_port = 8080

  [[services.ports]]
    handlers = ['http']
    port     = 80
    force_https = true

  [[services.ports]]
    handlers = ['tls', 'http']
    port     = 443

  [services.concurrency]
    type       = 'connections'
    hard_limit = 200
    soft_limit = 150

  [[services.tcp_checks]]
    interval      = '10s'
    timeout       = '2s'
    grace_period  = '5s'
    restart_limit = 3

[[services]]
  protocol      = 'tcp'
  internal_port = 3333

  [[services.ports]]
    port     = 3333
    handlers = ['tcp']

[mounts]
  # Uncomment to mount a volume for the keystore file:
  # source      = 'magofonte_secrets'
  # destination = '/app/secrets'
