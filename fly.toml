# MagoFonte — lancia branch — Fly.io config
# Free tier: shared-cpu-1x, 256 MB RAM
# Deploy: fly launch --no-deploy  then  fly secrets set ...  then  fly deploy

app            = 'magofonte'
primary_region = 'iad'

[build]
  # Uses repo Dockerfile automatically

[env]
  NODE_ENV = 'production'
  PORT     = '8080'
  # Do NOT put API_KEY or any secret here — use: fly secrets set API_KEY=...

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = 'connections'
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size   = 'shared-cpu-1x'
  memory = '256mb'

# Stratum TCP (miners) — Fly supports raw TCP, free tier included
[[services]]
  protocol      = 'tcp'
  internal_port = 3333

  [[services.ports]]
    port = 3333

[[checks]]
  name     = 'health'
  type     = 'http'
  path     = '/health'
  interval = '30s'
  timeout  = '5s'
